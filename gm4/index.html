<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Grand Prix — Multiplayer Racing</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
      canvas { display: block; }
      #connect {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: #1a1a1a; border: 2px solid #444; border-radius: 12px;
        padding: 32px 40px; color: #fff; font-family: monospace; text-align: center;
        z-index: 10;
      }
      #connect h1 { font-size: 36px; margin-bottom: 8px; letter-spacing: 2px; }
      #connect p { color: #888; margin-bottom: 24px; font-size: 14px; }
      #connect input {
        display: block; width: 100%; padding: 10px 14px; margin-bottom: 12px;
        background: #222; border: 1px solid #555; border-radius: 6px;
        color: #fff; font-family: monospace; font-size: 16px;
      }
      #connect button {
        width: 100%; padding: 12px; background: #2a6; border: none; border-radius: 6px;
        color: #fff; font-family: monospace; font-size: 18px; font-weight: bold;
        cursor: pointer; letter-spacing: 1px;
      }
      #connect button:hover { background: #3b7; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="connect">
      <h1>GRAND PRIX</h1>
      <p>Multiplayer Racing — up to 8 players</p>
      <input type="text" id="roomInput" placeholder="Room code (leave blank for auto)" autocomplete="off" />
      <button id="joinBtn">JOIN RACE</button>
    </div>
    <script src="game.js"></script>
  </body>
</html>
